name: Build and Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.15.2

      - name: Build Linux
        run: zig build -Dtarget=x86_64-linux-gnu -Doptimize=ReleaseSafe

      - name: Package Linux
        run: |
          mv zig-out/bin/flint flint-linux-x86_64
          tar -czvf flint-linux-x86_64.tar.gz flint-linux-x86_64

      - name: Build Windows
        run: |
          rm -rf zig-out zig-cache
          zig build -Dtarget=x86_64-windows-gnu -Doptimize=ReleaseSafe

      - name: Package Windows
        run: |
          mv zig-out/bin/flint.exe flint-windows-x86_64.exe
          zip flint-windows-x86_64.zip flint-windows-x86_64.exe

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flint-linux-x86_64.tar.gz
          path: flint-linux-x86_64.tar.gz

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flint-windows-x86_64.zip
          path: flint-windows-x86_64.zip

      # --- Auto-increment version on master push ---
      - name: Get latest tag and bump patch version
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        id: bump_version
        run: |
          # Get the latest tag, default to v0.1.0 if none exists
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v0.1.0"
          else
            # Split into parts and increment patch
            VERSION="${LATEST#v}"
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Bumped version to $NEW_TAG"

      - name: Push new tag
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.bump_version.outputs.new_tag }}
          git push origin ${{ steps.bump_version.outputs.new_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Publish Release (master → rolling latest pre-release)
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump_version.outputs.new_tag }}
          name: ${{ steps.bump_version.outputs.new_tag }}
          prerelease: false
          files: |
            flint-linux-x86_64.tar.gz
            flint-windows-x86_64.zip
          generate_release_notes: true

      # --- Proper versioned release on manual tag push ---
      - name: Publish Release (manual tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flint-linux-x86_64.tar.gz
            flint-windows-x86_64.zip
          generate_release_notes: true